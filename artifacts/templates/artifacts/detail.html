{% extends 'artifacts/base.html' %}

{% block title %}{{ object.title }} - Dijital Müze{% endblock %}

{% block content %}
<div id="main-content" class="relative animate-fade-in">
    <!-- Breadcrumb -->
    <nav class="mb-12 flex items-center gap-3 text-sm font-bold uppercase tracking-widest text-slate-400">
        <a href="{% url 'artifacts:index' %}" class="hover:text-amber-500 transition">Koleksiyon</a>
        <i class="fas fa-chevron-right text-[10px]"></i>
        <span class="text-amber-600">Eser Detayı</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
        <!-- Model Preview Area -->
        <div class="lg:col-span-7 group relative">
            <div id="preview-frame" class="bg-white dark:bg-slate-800 rounded-[3rem] overflow-hidden relative h-[500px] md:h-[700px] shadow-2xl border border-slate-100 dark:border-slate-700/50 transition-all flex flex-col">
                <div class="flex-1 relative bg-slate-50 dark:bg-slate-900/50">
                    <model-viewer 
                        id="artifact-viewer"
                        src="{{ object.model_3d.url }}" 
                        {% if object.model_ios %}ios-src="{{ object.model_ios.url }}"{% endif %}
                        alt="{{ object.title }}"
                        shadow-intensity="1" 
                        camera-controls 
                        auto-rotate 
                        touch-action="pan-y"
                        interaction-prompt="auto"
                        exposure="0.8"
                        shadow-softness="1"
                        class="w-full h-full"
                        style="--poster-color: transparent;"
                    >
                        <div slot="progress-bar" id="viewer-loader" class="absolute inset-0 z-20 flex items-center justify-center bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm transition-opacity duration-500">
                            <div class="flex flex-col items-center gap-4">
                                <div class="loading-spinner"></div>
                                <span class="text-[10px] font-black text-amber-600 dark:text-amber-400 uppercase tracking-widest animate-pulse">Model Hazırlanıyor...</span>
                            </div>
                        </div>
                    </model-viewer>

                    <script>
                        // Model yüklendiğinde yükleme ekranını gizle (Manuel kontrol)
                        const viewer = document.querySelector('#artifact-viewer');
                        const loader = document.querySelector('#viewer-loader');
                        
                        if (viewer && loader) {
                            viewer.addEventListener('load', () => {
                                loader.classList.add('hide-loader');
                                setTimeout(() => loader.style.display = 'none', 500);
                            });
                        }
                    </script>

                    <!-- Preview Badge -->
                    <div class="absolute top-8 left-8 z-10 pointer-events-none">
                        <div class="glass px-4 py-2 rounded-2xl flex items-center gap-2">
                            <div class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></div>
                            <span class="text-[10px] font-black text-amber-600 dark:text-amber-400 uppercase tracking-widest">Premium 3D Viewer</span>
                        </div>
                    </div>
                </div>

                <!-- Preview Controls -->
                <div class="p-6 border-t border-slate-100 dark:border-slate-700 flex justify-center gap-4 bg-white/50 dark:bg-slate-800/50 backdrop-blur-md">
                    <a href="{% url 'artifacts:ar_view' object.pk %}" class="w-full md:w-auto px-10 py-5 bg-amber-500 hover:bg-amber-600 text-white rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-amber-500/30 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-4">
                        <i class="fas fa-cube text-lg"></i>
                        <span>ALANDA GÖRÜNTÜLE (AR MODU)</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Details Area -->
        <div class="lg:col-span-5 flex flex-col gap-10">
            <div>
                <h1 class="text-4xl md:text-5xl font-outfit font-black mb-6 tracking-tight leading-tight">{{ object.title }}</h1>
                <div class="h-1.5 w-20 bg-amber-500 rounded-full mb-10"></div>
                
                <div class="prose prose-slate dark:prose-invert max-w-none">
                    <p class="text-slate-500 dark:text-slate-400 text-lg leading-relaxed font-medium">
                        {{ object.description }}
                    </p>
                </div>
            </div>

            <!-- Specs Grid -->
            <div class="grid grid-cols-1">
                <div class="p-6 rounded-3xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Materyal</p>
                    <p class="font-bold text-slate-700 dark:text-slate-200">Dijital Tarama</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- A-Frame Script provided via base.html -->

<style>
    @keyframes fade-in {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
        animation: fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    a-scene { background: transparent !important; }

    /* Loading Spinner */
    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(245, 158, 11, 0.1);
        border-top: 4px solid #f59e0b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    .hide-loader {
        opacity: 0;
        pointer-events: none;
    }
</style>
{% endblock %}
